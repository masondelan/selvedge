name: Deploy landing page to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          # Auto-enable Pages on the repo if it isn't already configured.
          # Without this the workflow needs a manual one-time toggle in
          # Settings -> Pages -> Source: GitHub Actions, which is what
          # made every run from Apr 22 through v0.3.4 fail with
          # "HttpError: Not Found" on this configure-pages step.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
